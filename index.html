<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHARIS TAIWAN｜肌膚診斷</title>
  <meta name="description" content="RENE CELL 潤妮秀 - 找到最適合你的保養系列" />

  <!-- LINE LIFF SDK（需填入你的 LIFF ID） -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #B4729A;
      --pink-dark: #9A5C82;
      --pink-light: #FBEAF0;
      --text-primary: #1a1a1a;
      --text-secondary: #555;
      --text-muted: #888;
      --surface-0: #f5f3f0;
      --surface-1: #efefec;
      --surface-2: #fff;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.18);
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', 'PingFang TC', sans-serif;
      background: var(--surface-0);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0;
    }

    #app {
      width: 100%;
      max-width: 480px;
      background: var(--surface-2);
      min-height: 100vh;
      padding: 1.5rem 1.25rem 2rem;
      position: relative;
    }

    /* ── Header ── */
    .brand-header {
      text-align: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 0.5px solid var(--border);
    }
    .brand-logo-img {
      height: 36px;
      object-fit: contain;
      margin-bottom: 6px;
    }
    .brand-logo {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .brand-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 3px;
    }
    .brand-sub {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ── Progress ── */
    .progress-wrap {
      margin-bottom: 1.5rem;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .progress-bar {
      background: var(--surface-1);
      border-radius: 99px;
      height: 5px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink-dark), var(--pink));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ── Steps ── */
    .step { display: none; }
    .step.active { display: block; }

    .question {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1.25rem;
      line-height: 1.4;
    }

    .options { display: grid; gap: 9px; }

    .option-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    .option-btn:active { transform: scale(0.98); }
    .option-btn.selected {
      border-color: var(--pink);
      background: var(--pink-light);
    }
    .option-icon { font-size: 22px; width: 30px; text-align: center; flex-shrink: 0; }
    .option-text { font-size: 15px; color: var(--text-primary); font-weight: 500; }
    .option-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; }

    /* ── Nav ── */
    .nav-row { display: flex; gap: 8px; margin-top: 1.25rem; }
    .btn-back {
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 11px 16px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .btn-next {
      flex: 1;
      background: var(--pink);
      border: none;
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      opacity: 0.35;
      transition: opacity 0.2s, background 0.15s;
    }
    .btn-next.ready { opacity: 1; }
    .btn-next.ready:active { background: var(--pink-dark); transform: scale(0.98); }

    /* ── Result ── */
    .result { display: none; }
    .result.active { display: block; }

    .result-hero {
      text-align: center;
      padding: 1rem 0 1.5rem;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 1.25rem;
    }
    .result-emoji { font-size: 48px; margin-bottom: 8px; }
    .result-badge {
      display: inline-block;
      background: var(--pink-light);
      color: var(--pink-dark);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 99px;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    .result-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .result-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 1.25rem 0 0.75rem;
    }

    .products-list { display: flex; flex-direction: column; gap: 8px; }
    .product-card {
      background: var(--surface-1);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .product-num {
      width: 26px;
      height: 26px;
      background: var(--pink);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .product-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .product-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    .tips-box {
      background: var(--pink-light);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      margin-top: 0.75rem;
    }
    .tips-title { font-size: 13px; font-weight: 600; color: var(--pink-dark); margin-bottom: 8px; }
    .tips-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .tips-list li {
      font-size: 13px;
      color: #7a4a6a;
      display: flex;
      align-items: flex-start;
      gap: 7px;
      line-height: 1.5;
    }
    .tips-list li::before { content: '✦'; font-size: 9px; margin-top: 4px; flex-shrink: 0; }

    .cta-area { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 8px; }
    .btn-visit {
      width: 100%;
      background: var(--pink);
      border: none;
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
      letter-spacing: 0.5px;
    }
    .btn-visit:active { background: var(--pink-dark); transform: scale(0.98); }
    .btn-line {
      width: 100%;
      background: #06C755;
      border: none;
      border-radius: var(--radius);
      padding: 13px 16px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-line:active { background: #05a848; transform: scale(0.98); }
    .btn-restart {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 11px 16px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text-secondary);
    }

    /* ── Intro screen ── */
    .intro { text-align: center; padding: 1rem 0; }
    .intro-icon { font-size: 56px; margin-bottom: 1rem; }
    .intro-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .intro-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 1.5rem; }
    .intro-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 1.75rem; }
    .intro-tag {
      background: var(--pink-light);
      color: var(--pink-dark);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 99px;
    }
    .btn-start {
      width: 100%;
      background: var(--pink);
      border: none;
      border-radius: var(--radius);
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .btn-start:active { background: var(--pink-dark); }
  </style>
</head>

<div id="app">

    <!-- Q1 -->
    <div class="step" data-step="0">

      <div class="options">
        <button class="option-btn" data-val="dry">

        <button class="option-btn" data-val="oily">

          <span class="option-icon">⏳</span>
          <div><div class="option-text">抗老緊緻</div><div class="option-sub">細紋、鬆弛，希望維持年輕狀態</div></div>

        <button class="option-btn" data-val="40s">
          <span class="option-icon">🌳</span>
          <div><div class="option-text">40 – 49 歲</div><div class="option-sub">注重抗老、緊緻、深層滋養</div></div>

        <button class="option-btn" data-val="50plus">

        </button>
      </div>
      <div class="nav-row">
        <button class="btn-back" data-to="1">← 返回</button>
        <button class="btn-next" id="next-2">繼續 →</button>

    <!-- Q4 -->

// ── 狀態 ──────────────────────────────────────────
const answers = {};
const answerKeys = ['skin', 'concern', 'age', 'habit', 'ingredient'];
let currentStep = 0;
const totalSteps = 5;

// ── 邏輯 ──────────────────────────────────────────
function getResultKey() {
  const { concern, ingredient, habit, age, skin } = answers;
  if (concern === 'aging' || age === '50plus' || ingredient === 'biotech') return 'premium';
  if (concern === 'whitening' || ingredient === 'vitaminc') return 'whitening';
  if (concern === 'repair' || skin === 'sensitive') return 'repair';
  if (habit === 'mask') return 'mask';
  return 'basic';
}

function updateProgress(step) {
  const pct = Math.round((step / totalSteps) * 100);
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('step-label').textContent = `問題 ${step + 1} / ${totalSteps}`;
  document.getElementById('step-pct').textContent = pct + '%';
}

function goToStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.querySelector(`.step[data-step="${n}"]`).classList.add('active');
  currentStep = n;
  updateProgress(n);
  const sel = document.querySelector(`.step[data-step="${n}"] .option-btn.selected`);
  const nxt = document.getElementById(`next-${n}`);
  if (nxt) nxt.classList.toggle('ready', !!sel);
  window.scrollTo(0, 0);
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  const ra = document.getElementById('result-area');
  ra.classList.add('active');

  const key = getResultKey();
  const r = RESULTS[key];

  document.getElementById('r-emoji').textContent = r.emoji;
  document.getElementById('r-badge').textContent = r.badge;
  document.getElementById('r-title').textContent = r.title;
  document.getElementById('r-desc').textContent = r.desc;

  document.getElementById('r-products').innerHTML = r.products.map((p, i) =>
    `<div class="product-card">
      <div class="product-num">${i + 1}</div>
      <div>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
      </div>
    </div>`
  ).join('');

  document.getElementById('r-tips').innerHTML = r.tips.map(t =>
    `<li>${t}</li>`
  ).join('');

  document.getElementById('progress').style.width = '100%';
  window.scrollTo(0, 0);
}

// ── 事件 ──────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('progress-wrap').style.display = 'block';
  goToStep(0);
});

document.querySelectorAll('.option-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const step = btn.closest('.step');
    step.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    const si = parseInt(step.dataset.step);
    answers[answerKeys[si]] = btn.dataset.val;
    const nxt = document.getElementById(`next-${si}`);
    if (nxt) nxt.classList.add('ready');
  });
});

for (let i = 0; i < totalSteps; i++) {
  const btn = document.getElementById(`next-${i}`);
  if (!btn) continue;
  btn.addEventListener('click', () => {
    if (!btn.classList.contains('ready')) return;
    if (i < totalSteps - 1) goToStep(i + 1);
    else showResult();
  });
}

document.querySelectorAll('.btn-back').forEach(btn => {
  btn.addEventListener('click', () => goToStep(parseInt(btn.dataset.to)));
});

document.getElementById('restart-btn').addEventListener('click', () => {
  Object.keys(answers).forEach(k => delete answers[k]);
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('result-area').classList.remove('active');
  document.getElementById('intro-screen').style.display = 'block';
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('progress').style.width = '0%';
  window.scrollTo(0, 0);
});

// ── LINE 分享 ──────────────────────────────────────
document.getElementById('share-line-btn').addEventListener('click', async () => {
  const key = getResultKey();
  const r = RESULTS[key];
  const msg = `【CHARIS TAIWAN 肌膚診斷結果】\n${r.emoji} ${r.title}\n\n推薦產品：${r.products.map(p => p.name).join('、')}\n\n立即去試試：https://charis-global.tw/`;

  if (window.liff && liff.isInClient()) {
    try {
      await liff.shareTargetPicker([{ type: 'text', text: msg }]);
    } catch (e) { alert('分享失敗，請稍後再試'); }
  } else {
    const url = `https://line.me/R/msg/text/?${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  }
});
